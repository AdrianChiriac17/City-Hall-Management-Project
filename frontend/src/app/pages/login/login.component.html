<main class="auth-page">
  <div class="auth-dots" aria-hidden="true"></div>

  <!-- Transparent centered navbar -->
  <nav class="auth-nav">
    <a routerLink="/" class="auth-nav-link">HOME</a>
    <a routerLink="/dashboard" class="auth-nav-link">DASHBOARD</a>
    <a routerLink="/chatbot" class="auth-nav-link">CHAT BOT</a>
    <a routerLink="/register" class="auth-nav-link auth-nav-cta">REGISTER</a>
  </nav>

  <!-- Card -->
  <div class="card-wrap">
    <div class="auth-card">

      <!-- Left dark brand panel -->
      <div class="brand-panel">
        <img src="assets/images/LogoCityHall.png" alt="City Hall Logo" class="brand-logo-img">
      </div>

      <!-- Right form panel -->
      <div class="form-panel">
        <h1 class="form-title">Log in</h1>

        <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">

          <!-- Email field -->
          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="email" formControlName="email" placeholder="Username" class="field-input"/>
          </div>

          <!-- Password field -->
          <div class="field-row">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
            </svg>
            <input
              class="field-input password-input"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Password"
            />
            <button
              type="button"
              class="eye-btn"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
              (click)="togglePasswordVisibility()"
            >
              @if (!showPassword) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M3 3l18 18"/>
                  <path d="M10.6 5.7A10.6 10.6 0 0 1 12 5.5c6.3 0 9.9 6.5 9.9 6.5a18.4 18.4 0 0 1-2.6 3.4"/>
                  <path d="M6.5 6.8A18.2 18.2 0 0 0 2.1 12s3.6 6.5 9.9 6.5c1.5 0 2.8-.4 4-1"/>
                </svg>
              }
            </button>
          </div>

          <!-- Remember me + Forgot -->
          <div class="form-options">
            <label class="remember-label">
              <input type="checkbox" formControlName="rememberMe" class="remember-check"/>
              <span>Remember Me</span>
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          @if (message) {
            <p class="form-message" [class.success]="isSuccess">{{ message }}</p>
          }

          <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Logging in...' : 'Log in' }}
          </button>

          <p class="switch-text">or <a routerLink="/register">Sign up</a></p>
        </form>
      </div>

    </div>
  </div>

</main>
