<main class="auth-page">
  <section class="auth-wrapper">
    <div class="auth-brand-panel">
      <p>Primaria Municipiului Craiova</p>

      <div class="city-mark" aria-hidden="true">
        <span></span>
        <strong>CM</strong>
      </div>
    </div>

    <div class="auth-form-panel">
      <h1>Sign up</h1>

      <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="submit()">
        <div class="name-grid">
          <div>
            <label class="field-label" for="firstName">First Name</label>
            <div class="input-group">
              <input id="firstName" type="text" formControlName="firstName" placeholder="Ion" />
            </div>
          </div>

          <div>
            <label class="field-label" for="lastName">Last Name</label>
            <div class="input-group">
              <input id="lastName" type="text" formControlName="lastName" placeholder="Popescu" />
            </div>
          </div>
        </div>

        <label class="field-label" for="email">Email Address</label>
        <div class="input-group">
          <input id="email" type="email" formControlName="email" placeholder="ion.popescu@gmail.com" />
        </div>

        <div class="password-grid">
          <div>
            <label class="field-label" for="password">Password</label>

            <div class="input-group">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="**********"
              />

              <button
                type="button"
                class="eye-button"
                aria-label="Show or hide password"
                (click)="togglePasswordVisibility()"
              >
                View
              </button>
            </div>
          </div>

          <div>
            <label class="field-label" for="confirmPassword">Confirm Password</label>

            <div class="input-group">
              <input
                id="confirmPassword"
                [type]="showConfirmPassword ? 'text' : 'password'"
                formControlName="confirmPassword"
                placeholder="**********"
              />

              <button
                type="button"
                class="eye-button"
                aria-label="Show or hide confirm password"
                (click)="toggleConfirmPasswordVisibility()"
              >
                View
              </button>
            </div>
          </div>
        </div>

        <p *ngIf="message" class="form-message" [class.success]="isSuccess">
          {{ message }}
        </p>

        <button type="submit" class="submit-button" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating...' : 'Create Account' }}
        </button>

        <p class="switch-text">
          or
          <a routerLink="/login">Log in</a>
        </p>
      </form>
    </div>
  </section>
</main>
