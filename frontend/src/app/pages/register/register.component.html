<main class="auth-page">
  <div class="auth-dots" aria-hidden="true"></div>

  <!-- Transparent centered navbar -->
  <nav class="auth-nav">
    <a routerLink="/" class="auth-nav-link">HOME</a>
    <a routerLink="/dashboard" class="auth-nav-link">DASHBOARD</a>
    <a routerLink="/chatbot" class="auth-nav-link">CHAT BOT</a>
    <a routerLink="/login" class="auth-nav-link auth-nav-cta">LOG IN</a>
  </nav>

  <!-- Card -->
  <div class="card-wrap">
    <div class="auth-card">

      <!-- Left dark brand panel -->
      <div class="brand-panel">
        <img src="assets/images/LogoCityHall.png" alt="City Hall Logo" class="brand-logo-img">
      </div>

      <!-- Right form panel -->
      <div class="form-panel">
        <h1 class="form-title">Sign up</h1>

        <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="submit()">

          <!-- Full Name row: First + Last -->
          <div class="name-row">
            <div class="field-wrap">
              <label class="field-label" for="firstName">First Name</label>
              <div class="field-row">
                <input id="firstName" type="text" formControlName="firstName"
                  placeholder="Ion" class="field-input"/>
              </div>
            </div>
            <div class="field-wrap">
              <label class="field-label" for="lastName">Last Name</label>
              <div class="field-row">
                <input id="lastName" type="text" formControlName="lastName"
                  placeholder="Popescu" class="field-input"/>
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="field-wrap">
            <label class="field-label" for="reg-email">Email Address</label>
            <div class="field-row">
              <input id="reg-email" type="email" formControlName="email"
                placeholder="ion.popescu@gmail.com" class="field-input"/>
            </div>
          </div>

          <!-- Phone Number -->
          <div class="field-wrap">
            <label class="field-label" for="phoneNumber">Phone Number</label>
            <div class="field-row phone-field-row">
              <select id="phoneCountryCode" formControlName="phoneCountryCode" class="phone-code-select"
                aria-label="Country dialling code">
                @for (code of countryCodes; track code.dial + code.name) {
                  <option [value]="code.dial">{{ code.dial }} — {{ code.name }}</option>
                }
              </select>
              <span class="phone-sep" aria-hidden="true">|</span>
              <input id="phoneNumber" type="tel" formControlName="phoneNumber"
                class="field-input" placeholder="712 345 678"/>
            </div>
          </div>

          <!-- Address section -->
          <p class="section-label">Address</p>

          <div class="field-wrap">
            <label class="field-label" for="street">Street</label>
            <div class="field-row">
              <input id="street" type="text" formControlName="street"
                placeholder="Strada Republicii nr. 1" class="field-input"/>
            </div>
          </div>

          <div class="name-row">
            <div class="field-wrap">
              <label class="field-label" for="city">City</label>
              <div class="field-row">
                <input id="city" type="text" formControlName="city"
                  placeholder="Cluj-Napoca" class="field-input"/>
              </div>
            </div>
            <div class="field-wrap">
              <label class="field-label" for="postalCode">Postal Code</label>
              <div class="field-row">
                <input id="postalCode" type="text" formControlName="postalCode"
                  placeholder="400001" class="field-input"/>
              </div>
            </div>
          </div>

          <div class="field-wrap">
            <label class="field-label" for="country">Country</label>
            <div class="field-row">
              <select id="country" formControlName="country" class="field-input field-select"
                aria-label="Country">
                @for (c of countries; track c) {
                  <option [value]="c">{{ c }}</option>
                }
              </select>
            </div>
          </div>

          <!-- Password row -->
          <div class="password-row">
            <div class="field-wrap">
              <label class="field-label" for="reg-password">Password</label>
              <div class="field-row">
                <input
                  id="reg-password"
                  class="field-input password-input"
                  [type]="showPassword ? 'text' : 'password'"
                  formControlName="password"
                  placeholder="**********"
                />
                <button type="button" class="eye-btn"
                  [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                  (click)="togglePasswordVisibility()">
                  @if (!showPassword) {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  } @else {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M3 3l18 18"/>
                      <path d="M10.6 5.7A10.6 10.6 0 0 1 12 5.5c6.3 0 9.9 6.5 9.9 6.5a18.4 18.4 0 0 1-2.6 3.4"/>
                      <path d="M6.5 6.8A18.2 18.2 0 0 0 2.1 12s3.6 6.5 9.9 6.5c1.5 0 2.8-.4 4-1"/>
                    </svg>
                  }
                </button>
              </div>
            </div>

            <div class="field-wrap">
              <label class="field-label" for="confirmPassword">Confirm Password</label>
              <div class="field-row">
                <input
                  id="confirmPassword"
                  class="field-input password-input"
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  formControlName="confirmPassword"
                  placeholder="**********"
                />
                <button type="button" class="eye-btn"
                  [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
                  (click)="toggleConfirmPasswordVisibility()">
                  @if (!showConfirmPassword) {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M2.1 12s3.6-6.5 9.9-6.5S21.9 12 21.9 12s-3.6 6.5-9.9 6.5S2.1 12 2.1 12Z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  } @else {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M3 3l18 18"/>
                      <path d="M10.6 5.7A10.6 10.6 0 0 1 12 5.5c6.3 0 9.9 6.5 9.9 6.5a18.4 18.4 0 0 1-2.6 3.4"/>
                      <path d="M6.5 6.8A18.2 18.2 0 0 0 2.1 12s3.6 6.5 9.9 6.5c1.5 0 2.8-.4 4-1"/>
                    </svg>
                  }
                </button>
              </div>
            </div>
          </div>

          @if (message) {
            <p class="form-message" [class.success]="isSuccess">{{ message }}</p>
          }

          <button type="submit" class="submit-btn" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Creating...' : 'Create Account' }}
          </button>

          <p class="switch-text">or <a routerLink="/login">Log in</a></p>
        </form>
      </div>

    </div>
  </div>

</main>
