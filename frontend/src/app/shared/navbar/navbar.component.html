<header class="navbar">
  <a routerLink="/" class="logo" (click)="closeMenu()">City Hall Management</a>

  <button
    class="menu-button"
    type="button"
    aria-label="Open navigation menu"
    (click)="toggleMenu()"
  >
    &#9776;
  </button>

  <nav class="nav-links" [class.open]="isMenuOpen">
    <!-- Always visible -->
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeMenu()"
    >Home</a>

    <a
      routerLink="/forum"
      routerLinkActive="active"
      (click)="closeMenu()"
    >Forum</a>

    <a
      routerLink="/chatbot"
      routerLinkActive="active"
      (click)="closeMenu()"
    >Chat Bot</a>

    <!-- Auth-gated links -->
    @if (currentUser()) {
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Dashboard</a>

      <a
        routerLink="/profile"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Profile</a>

      @if (isAdmin) {
        <a
          routerLink="/admin"
          routerLinkActive="active"
          (click)="closeMenu()"
          class="admin-link"
        >Admin</a>
      }

      <button
        type="button"
        class="logout-btn"
        (click)="logout()"
      >Logout</button>
    } @else {
      <div class="auth-links">
        <a class="login-link" routerLink="/login" routerLinkActive="active" (click)="closeMenu()">Login</a>
        <a class="register-link" routerLink="/register" routerLinkActive="active" (click)="closeMenu()">Register</a>
      </div>
    }
  </nav>
</header>
